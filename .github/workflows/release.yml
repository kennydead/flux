name: Build and Release Flux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Flux ${{ github.ref_name }}
          releaseBody: |
            ## Install

            - **Mac**: Download `Flux_x.x.x_universal.dmg`, open it, drag Flux to Applications. Right-click → Open on first launch if macOS warns about the developer.
            - **Windows**: Download `Flux_x.x.x_x64-setup.exe`, run the installer. Click "More info → Run anyway" if Windows SmartScreen appears.

            ## Requirements
            - [Docker Desktop](https://www.docker.com/products/docker-desktop/) must be installed and running.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
